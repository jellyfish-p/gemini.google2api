name: Package

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - docs/**
      - '**/*.md'
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build package artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build output
        run: |
          tar -czf gemini-google2api-${{ github.sha }}.tar.gz \
            .output \
            package.json \
            package-lock.json \
            config.toml

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-google2api-${{ github.sha }}
          path: gemini-google2api-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 14
