name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore Nuxt build cache
        uses: actions/cache@v4
        with:
          path: |
            .nuxt/cache
            node_modules/.cache
          key: ${{ runner.os }}-nuxt-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'server/**', 'nuxt.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nuxt-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package build output
        run: |
          tar -czf gemini-google2api-${{ github.sha }}.tar.gz \
            .output \
            package.json \
            package-lock.json \
            config.toml

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-google2api-${{ github.sha }}
          path: gemini-google2api-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 14
